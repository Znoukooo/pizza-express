<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Staff - Pizza Express</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-4 text-danger">🍕 Staff Login</h3>
            <p class="text-muted text-center small mb-4">Khusus untuk Kasir, Dapur, Kurir, dan Admin</p>
            <form id="login-form">
              <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Username</label>
                <input type="text" id="username" class="form-control" required placeholder="Username staff">
              </div>
              <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Password staff">
              </div>
              <button type="submit" class="btn btn-danger w-100 fw-bold py-2 shadow-sm">Masuk Sistem</button>
            </form>
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none small text-muted">&larr; Kembali ke Menu Pelanggan</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
</body>
</html>
